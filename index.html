<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Creative Showcase</title>
  <link rel="stylesheet" href="reset.css">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/jquery-3.7.1.js"></script>
  <script src="js/script.js" defer></script>
</head>
<body>

  <main class="page-wrapper">
    <header class="page-header">
      <h1>Project Showcase</h1>
      <p>
        Click a thumbnail to update the featured project.
      </p>
    </header>

    <!-- Featured project area -->
    <section class="featured-project">
      <img
        id="featured-image"
        src="https://placehold.co/1000x600/2d3748/ffffff?text=Concert+Poster+Campaign"
        alt="Featured creative project"
      >

      <div class="featured-text">
        <h2 id="project-title">Concert Poster Campaign</h2>
        <p id="project-description">
          Poster design created to promote a live music event with strong typography and dramatic color contrast.
        </p>
      </div>
    </section>

    <!-- Thumbnail gallery -->
    <section class="thumbnail-gallery">
      <h2 class="section-heading">Project Thumbnails</h2>

      <div class="thumb-grid">
        <img
          class="thumb active"
          src="https://placehold.co/300x180/2d3748/ffffff?text=Concert+Poster"
          data-full="https://placehold.co/1000x600/2d3748/ffffff?text=Concert+Poster+Campaign"
          data-title="Concert Poster Campaign"
          data-description="Poster design created to promote a live music event with strong typography and dramatic color contrast."
          alt="Thumbnail for Concert Poster Campaign"
        >

        <img
          class="thumb"
          src="https://placehold.co/300x180/805ad5/ffffff?text=Coffee+Shop+Website"
          data-full="https://placehold.co/1000x600/805ad5/ffffff?text=Coffee+Shop+Website+Mockup"
          data-title="Coffee Shop Website Mockup"
          data-description="A homepage concept for a small café website featuring clear navigation, inviting imagery, and a clean layout."
          alt="Thumbnail for Coffee Shop Website Mockup"
        >

        <img
          class="thumb"
          src="https://placehold.co/300x180/3182ce/ffffff?text=Portraits"
          data-full="https://placehold.co/1000x600/3182ce/ffffff?text=Portrait+Series"
          data-title="Portrait Series"
          data-description="A portrait photography project focused on natural light, personality, and visual storytelling around campus."
          alt="Thumbnail for Portrait Series"
        >

        <img
          class="thumb"
          src="https://placehold.co/300x180/dd6b20/ffffff?text=Short+Film+Promo"
          data-full="https://placehold.co/1000x600/dd6b20/ffffff?text=Short+Film+Promo"
          data-title="Short Film Promo"
          data-description="A promotional image designed for a student-produced short film using layered imagery."
          alt="Thumbnail for Short Film Promo Graphic"
        >

        <!-- <img
          class="thumb"
          src="https://placehold.co/300x180/38a169/ffffff?text=Brand+Identity"
          data-full="https://placehold.co/1000x600/38a169/ffffff?text=Brand+Identity+Package"
          data-title="Brand Identity Package"
          data-description="A logo and branding system developed for a fictional company, including color palette and design direction."
          alt="Thumbnail for Brand Identity Package"
        >

        <img
          class="thumb"
          src="https://placehold.co/300x180/d53f8c/ffffff?text=Travel+Photo+Story"
          data-full="https://placehold.co/1000x600/d53f8c/ffffff?text=Travel+Photo+Story"
          data-title="Travel Photo Story"
          data-description="A photo-based storytelling project that captures a sense of place through composition, detail, and mood."
          alt="Thumbnail for Travel Photo Story"
        > -->
      </div>
    </section>
  </main>

</body>
</html>
